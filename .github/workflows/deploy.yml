name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: ${{ secrets.GCP_REGION }}
  SERVICE_WEB: venturelens-web
  SERVICE_WORKER: venturelens-worker
  IMAGE: venturelens/app

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo_sqlite, intl, zip

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction

      - name: Copy env
        run: cp .env.example .env

      - name: Generate key
        run: php artisan key:generate

      - name: Run tests
        run: php artisan test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        run: |
          IMAGE_URI=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.IMAGE }}:${{ github.sha }}
          docker build -f docker/Dockerfile -t "$IMAGE_URI" .
          docker push "$IMAGE_URI"
          echo "IMAGE_URI=$IMAGE_URI" >> $GITHUB_ENV

      - name: Deploy web service
        env:
          STRIPE_PRICE_COHORT: ${{ secrets.STRIPE_PRICE_COHORT }}
          STRIPE_PRICE_STARTER: ${{ secrets.STRIPE_PRICE_STARTER }}
          DEMO_USER_PASSWORD: ${{ secrets.DEMO_USER_PASSWORD }}
        run: |
          ENV_VARS="APP_ENV=production,APP_DEBUG=false,LOG_CHANNEL=stderr,QUEUE_CONNECTION=database,RUN_MIGRATIONS=true,GEMINI_MODEL_FLASH=gemini-2.5-flash,GEMINI_MAX_RETRIES=5,SESSION_DRIVER=database,CACHE_STORE=database,DB_CONNECTION=mysql,DB_SOCKET=/cloudsql/${{ env.PROJECT_ID }}:${{ env.REGION }}:venturelens,DB_DATABASE=venturelens,DB_USERNAME=venturelens,DEMO_USER_EMAIL=demo@venturelens.app,DEMO_USER_PASSWORD=${DEMO_USER_PASSWORD:-demo123},STRIPE_PRICE_COHORT=${STRIPE_PRICE_COHORT},STRIPE_PRICE_STARTER=${STRIPE_PRICE_STARTER}"
          SECRETS="APP_KEY=venturelens-app-key:latest,GEMINI_API_KEY=gemini-api-key:latest,DB_PASSWORD=venturelens-db-password:latest,STRIPE_SECRET=stripe-secret:latest,STRIPE_WEBHOOK_SECRET=stripe-webhook-secret:latest"
          gcloud run deploy ${{ env.SERVICE_WEB }} \
            --image "$IMAGE_URI" \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --memory 1Gi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 10 \
            --set-env-vars "$ENV_VARS" \
            --set-secrets "$SECRETS" \
            --add-cloudsql-instances "${{ env.PROJECT_ID }}:${{ env.REGION }}:venturelens"

      - name: Deploy worker service
        env:
          STRIPE_PRICE_COHORT: ${{ secrets.STRIPE_PRICE_COHORT }}
          STRIPE_PRICE_STARTER: ${{ secrets.STRIPE_PRICE_STARTER }}
          DEMO_USER_PASSWORD: ${{ secrets.DEMO_USER_PASSWORD }}
        run: |
          ENV_VARS="CONTAINER_ROLE=worker,APP_ENV=production,APP_DEBUG=false,LOG_CHANNEL=stderr,QUEUE_CONNECTION=database,GEMINI_MODEL_FLASH=gemini-2.5-flash,GEMINI_MAX_RETRIES=5,SESSION_DRIVER=database,CACHE_STORE=database,DB_CONNECTION=mysql,DB_SOCKET=/cloudsql/${{ env.PROJECT_ID }}:${{ env.REGION }}:venturelens,DB_DATABASE=venturelens,DB_USERNAME=venturelens,DEMO_USER_EMAIL=demo@venturelens.app,DEMO_USER_PASSWORD=${DEMO_USER_PASSWORD:-demo123},STRIPE_PRICE_COHORT=${STRIPE_PRICE_COHORT},STRIPE_PRICE_STARTER=${STRIPE_PRICE_STARTER}"
          gcloud run deploy ${{ env.SERVICE_WORKER }} \
            --image "$IMAGE_URI" \
            --region ${{ env.REGION }} \
            --platform managed \
            --no-allow-unauthenticated \
            --memory 1Gi \
            --cpu 1 \
            --min-instances 1 \
            --max-instances 5 \
            --set-env-vars "$ENV_VARS" \
            --set-secrets "APP_KEY=venturelens-app-key:latest,GEMINI_API_KEY=gemini-api-key:latest,DB_PASSWORD=venturelens-db-password:latest,STRIPE_SECRET=stripe-secret:latest" \
            --add-cloudsql-instances "${{ env.PROJECT_ID }}:${{ env.REGION }}:venturelens"
