services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "8080:8080"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_KEY: ${APP_KEY:-base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=}
      APP_URL: http://localhost:8080
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: venturelens
      DB_USERNAME: venturelens
      DB_PASSWORD: secret
      QUEUE_CONNECTION: database
      SESSION_DRIVER: database
      CACHE_STORE: database
      RUN_MIGRATIONS: "true"
      RUN_SEED: "true"
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      STRIPE_KEY: ${STRIPE_KEY:-}
      STRIPE_SECRET: ${STRIPE_SECRET:-}
      STRIPE_PRICE_COHORT: ${STRIPE_PRICE_COHORT:-}
      STRIPE_PRICE_STARTER: ${STRIPE_PRICE_STARTER:-}
    depends_on:
      mysql:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    environment:
      CONTAINER_ROLE: worker
      APP_ENV: local
      APP_KEY: ${APP_KEY:-base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_DATABASE: venturelens
      DB_USERNAME: venturelens
      DB_PASSWORD: secret
      QUEUE_CONNECTION: database
      SESSION_DRIVER: database
      CACHE_STORE: database
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8
    environment:
      MYSQL_DATABASE: venturelens
      MYSQL_USER: venturelens
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s

volumes:
  mysql_data:
