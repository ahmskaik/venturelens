services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "8080:8080"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_KEY: base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: venturelens
      DB_USERNAME: venturelens
      DB_PASSWORD: secret
      QUEUE_CONNECTION: database
      RUN_MIGRATIONS: "true"
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    depends_on:
      - mysql

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    environment:
      CONTAINER_ROLE: worker
      APP_ENV: local
      APP_KEY: base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_DATABASE: venturelens
      DB_USERNAME: venturelens
      DB_PASSWORD: secret
      QUEUE_CONNECTION: database
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    depends_on:
      - mysql

  mysql:
    image: mysql:8
    environment:
      MYSQL_DATABASE: venturelens
      MYSQL_USER: venturelens
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
